<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>灵芽视频生成 - 设置</title>
    <style>
        :root {
            --bg: #f5f7fa;
            --card-bg: #fff;
            --text: #1f2a3a;
            --text-secondary: #6b7785;
            --border: #e3e8ef;
            --primary: #4f6ef7;
            --primary-hover: #3b5de7;
            --success: #2ecc71;
            --danger: #e74c3c;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 24px;
            line-height: 1.6;
        }
        .container { max-width: 720px; margin: 0 auto; }
        h1 {
            font-size: 22px;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 16px;
            box-shadow: 0 1px 3px rgba(0,0,0,.06);
        }
        .card-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--text);
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group:last-child { margin-bottom: 0; }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
            color: var(--text-secondary);
        }
        input, select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            background: var(--card-bg);
            color: var(--text);
            transition: border-color .2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79,110,247,.12);
        }
        input::placeholder { color: #adb5bd; }
        .hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s;
        }
        .btn-primary {
            background: var(--primary);
            color: #fff;
        }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-primary:disabled {
            opacity: .5;
            cursor: not-allowed;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            margin-top: 12px;
            border-top: 1px solid var(--border);
        }
        .status-msg {
            font-size: 13px;
            color: var(--text-secondary);
        }
        .status-msg.success { color: var(--success); }
        .status-msg.error { color: var(--danger); }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-ok { background: #d4edda; color: #155724; }
        .badge-missing { background: #f8d7da; color: #721c24; }
        .inline-row {
            display: flex;
            gap: 12px;
        }
        .inline-row .form-group { flex: 1; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 灵芽视频生成 · 设置</h1>

        <div class="card">
            <div class="card-title">API 配置</div>
            <div class="form-group">
                <label>API 地址</label>
                <input type="text" id="apiBase" placeholder="https://api.lingyaai.cn" />
                <div class="hint">灵芽 API 服务器地址，默认 https://api.lingyaai.cn</div>
            </div>
            <div class="form-group">
                <label>API Key</label>
                <input type="password" id="apiKey" placeholder="sk-..." />
                <div class="hint">在灵芽AI控制台获取的 API Key</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">生成设置</div>
            <div class="form-group">
                <label>模型</label>
                <select id="model">
                    <option value="wan2.7-t2v">文生视频 (wan2.7-t2v)</option>
                    <option value="wan2.7-i2v">图生视频 (wan2.7-i2v)</option>
                    <option value="wan2.7-r2v">参考生视频 (wan2.7-r2v)</option>
                    <option value="wan2.7-videoedit">视频编辑 (wan2.7-videoedit)</option>
                </select>
                <div class="hint">文生视频适用于文字描述生成，图生视频/参考生视频需要提供图片或视频</div>
            </div>
            <div class="inline-row">
                <div class="form-group">
                    <label>分辨率</label>
                    <select id="resolution">
                        <option value="720P">720P</option>
                        <option value="1080P">1080P</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>默认时长 (秒)</label>
                    <input type="number" id="duration" min="2" max="15" placeholder="5" />
                    <div class="hint">t2v/i2v: 2-15, r2v/videoedit: 2-10</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">高级设置</div>
            <div class="inline-row">
                <div class="form-group">
                    <label>最大并发生成数</label>
                    <input type="number" id="maxConcurrent" min="1" max="10" placeholder="3" />
                    <div class="hint">同时进行的视频生成任务数量</div>
                </div>
                <div class="form-group">
                    <label>轮询超时 (秒)</label>
                    <input type="number" id="pollTimeout" min="60" max="1800" placeholder="300" />
                    <div class="hint">视频生成最长等待时间</div>
                </div>
                <div class="form-group">
                    <label>轮询间隔 (秒)</label>
                    <input type="number" id="pollInterval" min="5" max="60" placeholder="15" />
                    <div class="hint">每次查询生成状态的间隔</div>
                </div>
            </div>
        </div>

        <div style="display:flex; gap:12px;">
            <button class="btn btn-primary" id="saveBtn">💾 保存设置</button>
            <button class="btn btn-primary" id="reloadBtn" style="background:#6c757d;">🔄 重新加载</button>
        </div>

        <div id="statusBar" class="status-bar">
            <span id="statusMsg" class="status-msg">就绪</span>
            <span id="apiStatus"></span>
        </div>
    </div>

    <script>
        const PLUGIN = 'astrbot_plugin_lingya_video';
        let bridge = null;

        async function init() {
            // 等待 bridge 就绪
            const maxWait = 30;
            for (let i = 0; i < maxWait; i++) {
                if (window.AstrBotPluginPage) {
                    bridge = window.AstrBotPluginPage;
                    break;
                }
                await new Promise(r => setTimeout(r, 200));
            }
            if (!bridge) {
                document.getElementById('statusMsg').textContent = '❌ Bridge 未加载';
                return;
            }
            await bridge.ready();
            await loadSettings();
        }

        async function loadSettings() {
            try {
                const data = await bridge.apiGet('settings');
                document.getElementById('apiBase').value = data.api_base || 'https://api.lingyaai.cn';
                document.getElementById('apiKey').value = '';
                document.getElementById('apiKey').placeholder = data.has_api_key ? '已配置，留空则不修改' : 'sk-...';
                document.getElementById('model').value = data.model || 'wan2.7-t2v';
                document.getElementById('resolution').value = data.resolution || '720P';
                document.getElementById('duration').value = data.duration || 5;
                document.getElementById('maxConcurrent').value = data.max_concurrent || 3;
                document.getElementById('pollTimeout').value = data.poll_timeout || 300;
                document.getElementById('pollInterval').value = data.poll_interval || 15;

                // API Key 状态
                document.getElementById('apiStatus').innerHTML = data.has_api_key
                    ? '<span class="badge badge-ok">✅ API Key 已配置</span>'
                    : '<span class="badge badge-missing">⚠️ 未配置 API Key</span>';

                document.getElementById('statusMsg').textContent = '✅ 设置已加载';
                document.getElementById('statusMsg').className = 'status-msg success';
            } catch (e) {
                document.getElementById('statusMsg').textContent = `❌ 加载设置失败: ${e.message}`;
                document.getElementById('statusMsg').className = 'status-msg error';
            }
        }

        async function saveSettings() {
            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 保存中...';

            try {
                // 只在用户实际输入了新 key 时才提交
                // 空字符串表示不修改（后端会跳过空值）
                // 或者你可以改成：只在非空时加入 payload
                await bridge.apiPost('config/update', {
                    api_base: document.getElementById('apiBase').value.trim(),
                    api_key: document.getElementById('apiKey').value.trim(),
                    model: document.getElementById('model').value,
                    resolution: document.getElementById('resolution').value,
                    duration: parseInt(document.getElementById('duration').value) || 5,
                    max_concurrent: parseInt(document.getElementById('maxConcurrent').value) || 3,
                    poll_timeout: parseInt(document.getElementById('pollTimeout').value) || 300,
                    poll_interval: parseInt(document.getElementById('pollInterval').value) || 15,
                });

                document.getElementById('statusMsg').textContent = '✅ 设置已保存并生效，无需重启插件';
                document.getElementById('statusMsg').className = 'status-msg success';
            } catch (e) {
                document.getElementById('statusMsg').textContent = `❌ 保存失败: ${e.message}`;
                document.getElementById('statusMsg').className = 'status-msg error';
            } finally {
                btn.disabled = false;
                btn.textContent = '💾 保存设置';
            }
        }

        // 事件绑定
        document.addEventListener('DOMContentLoaded', init);
        document.getElementById('saveBtn').addEventListener('click', saveSettings);
        document.getElementById('reloadBtn').addEventListener('click', loadSettings);
    </script>
</body>
</html>
